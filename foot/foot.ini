[main]
term=foot
font=DejaVuSansM Nerd Font: size=10.5
dpi-aware=yes

[colors]
foreground=cccccc

; background=012456
# Slightly darker options - pick one: 
; background=011a40   # slightly darker
; background=011230   # darker
background=010d24   # even darker
; background=0a0a1a   # very dark with blue tint
; background=0c0c14   # almost black with subtle blue
#
alpha=0.80

# cursor = <text color> <cursor color>
cursor=012456 cccccc

selection-foreground=012456
selection-background=cccccc

# Campbell - Normal colors
regular0=0c0c0c
regular1=c50f1f
regular2=13a10e
regular3=c19c00
regular4=0037da
regular5=881798
regular6=3a96dd
regular7=cccccc

# Campbell - Bright colors
bright0=767676
bright1=e74856
bright2=16c60c
bright3=f9f1a5
bright4=3b78ff
bright5=b4009e
bright6=61d6d6
bright7=f2f2f2

[scrollback]
lines=10000

[tweak]
sixel=yes
